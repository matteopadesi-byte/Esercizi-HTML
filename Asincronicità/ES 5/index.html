<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profilo Utente</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        margin-bottom: 20px;
      }

      .bottoni {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      .bottoni button {
        padding: 8px 16px;
        border: 2px solid #3498db;
        background: white;
        color: #3498db;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }
      .bottoni button:hover:not(:disabled) {
        background: #3498db;
        color: white;
      }
      .bottoni button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        max-width: 500px;
      }
      .card h2 {
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .card p {
        margin: 6px 0;
        color: #555;
      }
      .card .label {
        font-weight: bold;
        color: #333;
      }

      .barra-container {
        background: #ecf0f1;
        border-radius: 10px;
        height: 24px;
        margin-top: 12px;
        overflow: hidden;
      }

      .barra-progresso {
        height: 100%;
        background: #27ae60;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: bold;
        transition: width 0.3s;
      }

      .errore {
        background: #ffe0e0;
        color: #c0392b;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #e74c3c;
        max-width: 500px;
      }
    </style>
  </head>
  <body>
    <h1>👤 Caricatore Profili Utente</h1>
    <div class="bottoni" id="bottoni"></div>
    <div id="risultato"></div>

    <script src="script.js"></script>
  </body>
</html>
